# Corne Mini 3x5 Wireless - ZMK Configuration
# Converted from QMK/Vial - 2026-03-18

# Bluetooth
CONFIG_ZMK_KEYBOARD_NAME="Corne Mini"
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Sleep (30 min idle = desliga BT para economizar bateria)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# Combos - CRITICAL: max combos per key must accommodate 25+ combos on K
CONFIG_ZMK_COMBO_MAX_COMBOS_PER_KEY=26
CONFIG_ZMK_COMBO_MAX_KEYS_PER_COMBO=4
CONFIG_ZMK_COMBO_MAX_PRESSED_COMBOS=5

# Macros - increase queue for 128+ macros
CONFIG_ZMK_BEHAVIORS_QUEUE_SIZE=512

# Mouse support
CONFIG_ZMK_MOUSE=y
